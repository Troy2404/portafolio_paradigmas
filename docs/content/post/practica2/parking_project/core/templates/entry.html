<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Entrada de Vehículo</title>
    <style>body { font-family: Arial, sans-serif; margin: 40px; } .form-group { margin-bottom: 15px; }</style>
</head>
<body>
    <h1>Registrar Entrada de Vehículo</h1>
    <a href="{% url 'dashboard' %}">← Volver al Panel</a>
    <hr>

    {% if messages %}
        {% for message in messages %}
            <p style="color: red;">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %} <div class="form-group">
            <label for="plate">Placa del Vehículo:</label><br>
            <input type="text" id="plate" name="plate" required>
        </div>

        <div class="form-group">
            <label for="type">Tipo de Vehículo:</label><br>
            <select id="type" name="type" required>
                <option value="CAR">Automóvil</option>
                <option value="MOTORCYCLE">Motocicleta</option>
            </select>
        </div>

        <button type="submit" style="padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">
            Generar Ticket e Ingresar
        </button>
    </form>
</body>
</html>
